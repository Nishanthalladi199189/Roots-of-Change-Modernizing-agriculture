<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Schemes - Roots of Change</title>
    <link rel="stylesheet" href="project.css">
    <script>
        (function () {
            if (!localStorage.getItem("roc_current_user")) {
                window.location.href = "Login.html";
            }
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.8), rgba(118, 75, 162, 0.8)),
                        url('selllands.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        /* Professional Header */
        #roc {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.9));
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            margin: 20px auto;
            width: fit-content;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            animation: slideDown 1s ease-out;
        }

        #roc img {
            opacity: 1;
            display: block;
            margin: 0 auto;
            width: 400px;
            height: 100px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        #navbar {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.6));
            backdrop-filter: blur(15px);
            border-radius: 0 0 20px 20px;
            padding: 15px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 40px;
            text-align: center;
        }

        #navbar a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 8px;
            position: relative;
        }

        #navbar a:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        #navbar a:nth-child(5) {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Section */
        .header-section {
            text-align: center;
            margin-bottom: 50px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.9));
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .header-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(76, 175, 80, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .header-section h2 {
            font-size: 3.5em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            letter-spacing: -1px;
            position: relative;
            z-index: 1;
        }

        .header-section p {
            font-size: 1.3em;
            color: #555;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        /* Form Container */
        .form-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.9));
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4CAF50, #81C784, #4CAF50);
            animation: borderGlow 2s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .form-group select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1.1em;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        .form-group select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.95);
        }

        /* Results Container */
        .results-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.9));
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .results-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4CAF50, #81C784, #4CAF50);
            animation: borderGlow 2s ease-in-out infinite;
        }

        .results-container h2 {
            font-size: 2.2em;
            margin-bottom: 25px;
            color: #4CAF50;
            font-weight: 700;
        }

        .scheme-item {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #4CAF50;
            transition: all 0.3s ease;
        }

        .scheme-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .scheme-item h3 {
            font-size: 1.4em;
            color: #4CAF50;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .scheme-item p {
            font-size: 1.1em;
            color: #555;
            line-height: 1.6;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-section h2 {
                font-size: 2.5em;
            }
            
            .header-section p {
                font-size: 1.1em;
            }
            
            .form-container {
                padding: 30px 20px;
            }
            
            .results-container {
                padding: 30px 20px;
            }
            
            #navbar {
                padding: 12px 20px;
            }
            
            #navbar a {
                margin: 5px 8px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .header-section {
                padding: 30px 20px;
            }
            
            .header-section h2 {
                font-size: 2em;
            }
            
            .form-container {
                padding: 25px 15px;
            }
            
            .results-container {
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>

        <img src="logo.png" alt="Roots of Change">
    </div>
    <div id="navbar" class="nav">
        <a href="index.html">Home</a>

    <div class="container">
        <!-- Header Section -->
        <div class="header-section">
            <h2>🏛️ Government Schemes</h2>
            <p>Access information about latest government agricultural schemes and subsidies available for farmers across different states</p>
        </div>
        
        <!-- Form Container -->
        <div class="form-container">
            <div class="form-group">
                <label for="stateSelect">🗺️ Select a State:</label>
                <select id="stateSelect" onchange="showStateSchemes()">
                    <option value="" disabled selected>Select a State</option>
                    <option value="Andhra Pradesh">Andhra Pradesh</option>
                    <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                    <option value="Assam">Assam</option>
                    <option value="Bihar">Bihar</option>
                    <option value="Chattisgarh">Chattisgarh</option>
                    <option value="Goa">Goa</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Haryana">Haryana</option>
                    <option value="Himachal Pradesh">Himachal Pradesh</option>
                    <option value="Jharkhand">Jharkhand</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Kerala">Kerala</option>
                    <option value="Madhya Pradesh">Madhya Pradesh</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Manipur">Manipur</option>
                    <option value="Meghalaya">Meghalaya</option>
                    <option value="Mizoram">Mizoram</option>
                    <option value="Nagaland">Nagaland</option>
                    <option value="NewDelhi">New Delhi</option>
                    <option value="Odisha">Odisha</option>
                    <option value="Punjab">Punjab</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="Sikkim">Sikkim</option>
                    <option value="Tamil Nadu">Tamil Nadu</option>
                    <option value="Telangana">Telangana</option>
                    <option value="Tripura">Tripura</option>
                    <option value="Uttarakhand">Uttarakhand</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="West Bengal">West Bengal</option>
                </select>
            </div>
        </div>
    
        <!-- Results Display -->
        <div class="results-container">
            <h2>📋 Available Schemes</h2>
            <div id="schemeResults"></div>
        </div>
    </div>
    
    <script>
        function logout() {
            localStorage.removeItem("roc_current_user");
            window.location.href = "Login.html";
        }

        function showStateSchemes() {
            var stateSelect = document.getElementById("stateSelect");
            var selectedState = stateSelect.value;
            var resultsDiv = document.getElementById("schemeResults");
            
            var schemesData = {
                "Andhra Pradesh": [
                    { name: "Rythu Bandhu Scheme", description: "Financial assistance of ₹8,000 per acre per season to farmers for investment in agricultural inputs." },
                    { name: "Zero Interest Crop Loans", description: "Crop loans up to ₹3 lakh at zero interest rate for farmers." },
                    { name: "PM Kisan Samman Nidhi", description: "Income support of ₹6,000 per year to small and marginal farmers." }
                ],
                "Bihar": [
                    { name: "Bihar Agriculture Road Map", description: "Comprehensive plan for agricultural development with focus on irrigation and technology." },
                    { name: "Diesel Subsidy Scheme", description: "50% subsidy on diesel for agricultural pump sets." },
                    { name: "Mukhyamantri Krishi Saajh Yojana", description: "Subsidy for agricultural equipment and machinery." }
                ],
                "Gujarat": [
                    { name: "IKED Yojana", description: "Interest subsidy on agricultural loans for farmers." },
                    { name: "Khedut Sahay Yojana", description: "Assistance for crop damage due to natural calamities." },
                    { name: "Gujarat Green Revolution", description: "Promotion of modern agricultural techniques and organic farming." }
                ],
                "Maharashtra": [
                    { name: "Mahatma Jyotirao Phule Shetkari Karjmukti Yojana", description: "Loan waiver scheme for farmers with outstanding agricultural loans." },
                    { name: "Baliraja Chetana Yojana", description: "Awareness program for sustainable agricultural practices." },
                    { name: "PM Kisan Samman Nidhi", description: "Central government scheme providing ₹6,000 annually to eligible farmers." }
                ],
                "Punjab": [
                    { name: "Crop Diversification Scheme", description: "Encouraging farmers to shift from water-intensive crops to less water-consuming crops." },
                    { name: "Punjab Agricultural Export Policy", description: "Promoting agricultural exports and value addition." },
                    { name: "Soil Health Card Scheme", description: "Providing soil health cards to farmers for balanced fertilizer use." }
                ],
                "Uttar Pradesh": [
                    { name: "UP Krishi Rin Mafi Yojana", description: "Loan waiver scheme for small and marginal farmers." },
                    { name: "One District One Product (ODOP)", description: "Promoting agricultural products specific to each district." },
                    { name: "PM Kisan Samman Nidhi", description: "Income support of ₹6,000 per year to eligible farmers." }
                ]
            };
            
            if (selectedState && schemesData[selectedState]) {
                var schemes = schemesData[selectedState];
                var html = "";
                
                schemes.forEach(function(scheme) {
                    html += `
                        <div class="scheme-item">
                            <h3>🏛️ ${scheme.name}</h3>
                            <p>${scheme.description}</p>
                        </div>
                    `;
                });
                
                resultsDiv.innerHTML = html;
            } else {
                resultsDiv.innerHTML = '<p style="text-align: center; color: #666; font-size: 1.1em;">Please select a state to view available schemes.</p>';
            }
        }

        // Initialize with placeholder message
        document.getElementById("schemeResults").innerHTML = '<p style="text-align: center; color: #666; font-size: 1.1em;">Please select a state to view available schemes.</p>';
    </script>
